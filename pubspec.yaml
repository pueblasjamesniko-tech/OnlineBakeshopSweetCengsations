name: sweet_cengsations
description: Sweet Cengsations - Online Artisan Bakeshop Ordering System

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.6
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  permission_handler: ^11.3.1
  device_info_plus: ^11.2.0
  flutter_local_notifications: ^19.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  image_picker: ^1.1.2

flutter:
  uses-material-design: true

  
  assets:
    - assets/images/bakeshop_logo.jpg
